<!DOCTYPE html>
<html>
<head>
    <title>Car Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
        }

        .card-custom {
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            color: white;
        }

        .title {
            font-weight: 700;
            letter-spacing: 1px;
        }

        .form-control {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.2);
            color: white;
            box-shadow: none;
        }

        .btn-custom {
            background: #00c6ff;
            background: linear-gradient(to right, #0072ff, #00c6ff);
            border: none;
            font-weight: 600;
        }

        .btn-custom:hover {
            opacity: 0.9;
        }

        .result-box {
            background: rgba(0, 198, 255, 0.15);
            border-radius: 10px;
            padding: 15px;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center">

<div class="container">
    <div class="card card-custom p-5 shadow-lg">

        <h2 class="text-center mb-4 title">🚗 Car Price Predictor</h2>

        <form action="{{ url_for('predict') }}" method="post">

            <div class="row">
                <div class="col-md-6 mb-3">
    <label>Engine Size</label>
    <input type="number" name="enginesize" class="form-control"
       value="{{ input_data.enginesize if input_data else '' }}"
        placeholder="e.g. 100 – 300 cc" required>

</div>

<div class="col-md-6 mb-3">
    <label>Horsepower</label>
    <input type="number" name="horsepower"
       value="{{ input_data.horsepower if input_data else '' }}"
       class="form-control" placeholder="e.g. 70 – 250 hp" required>

</div>

<div class="col-md-6 mb-3">
    <label>Curb Weight</label>
    <input type="number" name="curbweight"
       value="{{ input_data.curbweight if input_data else '' }}"
       class="form-control" placeholder="e.g. 1500 – 4000 lbs" required>
</div>

<div class="col-md-6 mb-3">
    <label>Highway MPG</label>
    <input type="number" name="highwaympg"
       value="{{ input_data.highwaympg if input_data else '' }}"
       class="form-control" placeholder="e.g. 15 – 40 mpg" required>
</div>

            <button type="submit" class="btn btn-custom w-100 mt-3">Predict Price</button>
        </form>

        {% if prediction_text %}
        <div class="result-box text-center mt-4">
            <h5>{{ prediction_text }}</h5>
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
